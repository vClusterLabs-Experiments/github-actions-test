name: K8s AI Conformance

on:
  workflow_dispatch:
    inputs:
      k8s_version:
        required: true
        type: string
        description: 'Target K8s version (e.g., v1.34, v1.35)'
      tenancy_model:
        required: true
        type: choice
        default: 'private-nodes'
        description: 'vCluster tenancy model'
        options:
          - private-nodes
          - shared
          - standalone
      vcluster_version:
        required: true
        type: string
        description: 'vCluster OSS CLI version (e.g., v0.32.0)'
      ai_skills_ref:
        required: false
        type: string
        default: 'main'
        description: 'Branch/tag of loft-sh/ai-skills'

jobs:
  generate-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Derive submission metadata
        id: metadata
        env:
          TENANCY_MODEL: ${{ inputs.tenancy_model }}
        run: .github/scripts/ai-conformance-metadata.sh "${TENANCY_MODEL}"

      - name: Generate CI settings file
        env:
          AI_SKILLS_REF: ${{ inputs.ai_skills_ref }}
        run: |
          cat > "${RUNNER_TEMP}/ai-conformance-settings.json" <<EOF
          {
            "extraKnownMarketplaces": {
              "loft-sh": {
                "source": { "source": "github", "repo": "loft-sh/ai-skills", "ref": "${AI_SKILLS_REF}" }
              }
            },
            "enabledPlugins": {
              "vcluster-conformance@loft-sh": true,
              "rag-context@loft-sh": true
            }
          }
          EOF

      - name: 'Claude Code: Research + Build PRODUCT.yaml'
        id: generate
        uses: anthropics/claude-code-action@58dbe8ed6879f0d3b02ac295b20d5fdfe7733e0c # v1.0.85
        env:
          K8S_VERSION: ${{ inputs.k8s_version }}
          TENANCY_MODEL: ${{ inputs.tenancy_model }}
          PLATFORM_NAME: ${{ steps.metadata.outputs.platform_name }}
          VCLUSTER_VERSION: ${{ inputs.vcluster_version }}
          SUBMISSION_DIR: ${{ steps.metadata.outputs.submission_dir }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running in auto mode. Do NOT ask for user input — all values are pre-supplied.

            Generate a PRODUCT.yaml for vCluster's CNCF Kubernetes AI Platform Conformance submission.

            Inputs:
            - Kubernetes version: ${{ env.K8S_VERSION }}
            - Tenancy model: ${{ env.TENANCY_MODEL }}
            - Platform name: ${{ env.PLATFORM_NAME }}
            - vCluster version: ${{ env.VCLUSTER_VERSION }}
            - Submission directory: ${{ env.SUBMISSION_DIR }}
            - Vendor name: vCluster
            - Output path: ./output/PRODUCT.yaml

            Instructions:
            1. Use the /k8s-ai-conformance skill in auto mode
            2. Read the reference files (evidence-guide.md, deployment-modes.md)
            3. Fetch the upstream spec for the target version
            4. Build PRODUCT.yaml with all metadata filled and all MUST items set to Implemented with evidence URLs
            5. Write the completed file to ./output/PRODUCT.yaml

            Critical rules:
            - vendorName must be exactly 'vCluster' (CNCF Landscape name)
            - platformVersion is the OSS CLI version, NOT Platform UI version
            - All MUST items must have status 'Implemented' with at least 1 evidence URL
            - Do NOT modify id, description, or level fields from the spec template
            - evidence must be a YAML list [], never a string
            - Always include k8sConformanceUrl pointing to the merged k8s-conformance submission
          claude_args: |
            --bare
            --settings ${{ runner.temp }}/ai-conformance-settings.json
            --mcp-config {"mcpServers":{"vcluster-yaml":{"command":"npx","args":["-y","vcluster-yaml-mcp-server@0.5.0"]},"context7":{"command":"npx","args":["-y","@upstash/context7-mcp@1.3.2"]}}}
            --model opus
            --max-budget-usd 15.00
        continue-on-error: true

      - name: Verify PRODUCT.yaml was generated
        run: |
          if [ ! -f ./output/PRODUCT.yaml ]; then
            echo "::error::PRODUCT.yaml was not generated by Claude Code"
            exit 1
          fi
          echo "PRODUCT.yaml generated successfully"
          cat ./output/PRODUCT.yaml

      - name: Validate with upstream validator
        id: validate
        env:
          K8S_VERSION: ${{ inputs.k8s_version }}
          SUBMISSION_DIR: ${{ steps.metadata.outputs.submission_dir }}
        run: .github/scripts/ai-conformance-validate.sh "${K8S_VERSION}" "${SUBMISSION_DIR}" ./output/PRODUCT.yaml
        continue-on-error: true

      - name: Upload artifacts
        id: upload-results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: ai-conformance-${{ inputs.k8s_version }}-${{ inputs.tenancy_model }}-${{ github.run_id }}
          path: |
            ./output/PRODUCT.yaml
            ./output/validation-output.txt
          retention-days: 3
          if-no-files-found: ignore

      - name: Determine workflow status
        if: always()
        id: status
        run: |
          if [[ "${{ steps.validate.outcome }}" == 'failure' ]]; then
            {
              echo "workflow_failed=true"
              echo "status_emoji=❌"
              echo "status_text=Failed"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "workflow_failed=false"
              echo "status_emoji=✅"
              echo "status_text=Success"
            } >> "$GITHUB_OUTPUT"
          fi

      # TODO: Extract to loft-sh/github-actions composite action (ai-conformance-notification)
      - name: Send Slack notification (Success)
        if: always() && steps.status.outputs.workflow_failed == 'false'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.status_emoji }} (On-Demand) vCluster AI Conformance ${{ inputs.tenancy_model }}: ${{ steps.status.outputs.status_text }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.status_emoji }} vCluster AI Conformance (${{ inputs.tenancy_model }}) ${{ steps.status.outputs.status_text }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*K8s version:* `${{ inputs.k8s_version }}`\n*vCluster version:* `${{ inputs.vcluster_version }}`\n*Tenancy model:* `${{ inputs.tenancy_model }}`\n\nArtifacts: ${{ steps.upload-results.outputs.artifact-url }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_CI_TESTS_ALERTS }}
          webhook-type: incoming-webhook

      - name: Send Slack notification (Failure)
        if: always() && steps.status.outputs.workflow_failed == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.status_emoji }} (On-Demand) vCluster AI Conformance ${{ inputs.tenancy_model }}: ${{ steps.status.outputs.status_text }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.status_emoji }} vCluster AI Conformance (${{ inputs.tenancy_model }}) ${{ steps.status.outputs.status_text }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n*K8s version:* `${{ inputs.k8s_version }}`\n*vCluster version:* `${{ inputs.vcluster_version }}`\n*Tenancy model:* `${{ inputs.tenancy_model }}`\n\nArtifacts: ${{ steps.upload-results.outputs.artifact-url }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_CI_TESTS_ALERTS }}
          webhook-type: incoming-webhook

      - name: Fail
        if: always() && steps.status.outputs.workflow_failed == 'true'
        run: exit 1
